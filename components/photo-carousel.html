<style>

    }
    #photo-carousel .swiper-slide {
        background-position: center;
        background-size: cover;
        width: 300px;
        height: 300px;
        filter: grayscale(20%);
        transition: all 0.5s ease;
        border-radius: 4px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    #photo-carousel .swiper-slide-active {
        filter: grayscale(0%);
        transform: scale(1.1);
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        z-index: 10;

    #photo-carousel .swiper-slide img {

<script>
    // Initialize Swiper after a small delay to ensure styles are applied
    setTimeout(() => {
        new Swiper(".mySwiper", {
            effect: "coverflow",
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: "auto",
            loop: true,
            coverflowEffect: {
                rotate: 20,
                stretch: 0,
                depth: 100,
                modifier: 1,
                slideShadows: false,
            },
            autoplay: {
                delay: 3000,
                disableOnInteraction: false,
            },
            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },
        });
    }, 100);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Water VBS 2026 | Registration</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    
    <script src="/js/tailwind.js"></script>
    <link href="/css/font-awesome.min.css" rel="stylesheet">
    <link href="/css/css2.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #1a1c1e; --accent: #c5a059; --cream: #f9f7f2; }
        body { font-family: 'Montserrat', sans-serif; background-color: #111827; margin: 0; overflow-x: hidden; }
        
        /* --- FULL SCREEN DEEP OCEAN DRIFT BACKGROUND --- */
        .vbs-ocean-viewport {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 35%, #0369a1 70%, #0284c7 100%);
            background-size: 400% 400%;
            animation: oceanCurrents 20s ease infinite;
        }

        @keyframes oceanCurrents {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- THE TYPOGRAPHY ENGINE --- */
        .vbs-underwater-title {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(14, 165, 233, 0.6), 0 0 40px rgba(14, 165, 233, 0.3);
        }

        .vbs-label {
            font-family: 'Fredoka', sans-serif;
            letter-spacing: 0.05em;
        }

        /* --- ORGANIC OCEAN WAVE FORM FIELDS --- */
        .ocean-input {
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(14, 165, 233, 0.3);
            border-radius: 2rem;
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ocean-input:focus {
            outline: none;
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.85);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.25);
            transform: scale(1.01);
        }

        /* --- RISING BUBBLE GENERATOR ENGINE --- */
        .bubble-fountain {
            position: absolute;
            bottom: -20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(56,189,248,0.1) 100%);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 5;
            animation: riseUp linear infinite;
        }

        @keyframes riseUp {
            0% { transform: translateY(0) translateX(0) scale(0.6); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-105vh) translateX(50px) scale(1.4); opacity: 0; }
        }
    </style>

    <script>
        async function loadComponent(id, file) {
            try {
                const element = document.getElementById(id);
                const response = await fetch(file);
                if (!response.ok) return;
                const html = await response.text();
                element.innerHTML = html;
            } catch (error) { console.error(`Error loading ${file}:`, error); }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await loadComponent('header-placeholder', './components/header.html');
            await loadComponent('footer-placeholder', './components/footer.html');
            
            // Generate continuous localized bubble fountain streams
            const container = document.getElementById('bubbleCanvas');
            if (container) {
                for (let i = 0; i < 20; i++) {
                    const bubble = document.createElement('div');
                    bubble.className = 'bubble-fountain';
                    const size = Math.random() * 35 + 8;
                    bubble.style.width = `${size}px`;
                    bubble.style.height = `${size}px`;
                    bubble.style.left = `${Math.random() * 100}%`;
                    bubble.style.animationDuration = `${Math.random() * 6 + 6}s`;
                    bubble.style.animationDelay = `${Math.random() * 8}s`;
                    container.appendChild(bubble);
                }
            }
        });
    </script>
</head>
<body class="text-white flex flex-col min-h-screen">

    <div id="header-placeholder"></div>

    <!-- Solid Base Header Deck Anchor -->
    <section class="relative bg-[#1a1c1e] pt-20 pb-0 border-b-4 border-[#c5a059] z-40"></section>

    <!-- Full Viewport Ocean System Layout -->
    <div class="vbs-ocean-viewport flex-grow w-full relative flex flex-col justify-between overflow-hidden" id="bubbleCanvas">
        
        <!-- Header Ribbon Container Zone -->
        <header class="w-full max-w-[95rem] mx-auto px-6 pt-12 relative z-30 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-4xl md:text-6xl vbs-underwater-title tracking-tight uppercase">
                    Children VBS 2026
                </h1>
                <p class="text-xs uppercase tracking-widest text-sky-300 font-bold mt-1">
                    Summer &bull; A Fountain of Life Church
                </p>
            </div>
            
            <!-- Floating Flat Dashboard Badge -->
            <div class="bg-sky-500/10 border border-sky-400/30 px-6 py-2.5 rounded-full backdrop-blur-md text-xs font-bold uppercase tracking-widest text-sky-200 flex items-center gap-2">
                <span class="inline-block w-2 h-2 rounded-full bg-emerald-400 animate-ping"></span> Registration Open
            </div>
        </header>

        <!-- Main Fluid Symmetrical Layout Area -->
        <main class="w-full max-w-[95rem] mx-auto px-4 md:px-8 py-10 grid grid-cols-1 lg:grid-cols-12 gap-8 items-stretch flex-grow relative z-20">
            
            <!-- LEFT PANEL DECK: Form + Payments Module Stack -->
            <div class="lg:col-span-7 flex flex-col gap-6">
                
                <!-- Registration Form Control Panel -->
                <section class="bg-slate-900/40 border border-white/10 p-6 md:p-10 rounded-[2.5rem] backdrop-blur-xl shadow-2xl relative overflow-hidden flex-grow">
                    <form id="vbsForm" action="https://formspree.io/f/mqeokpwp" method="POST" class="space-y-8">
                        
                        <!-- Section 1: Guardian Profiles -->
                        <div>
                            <div class="flex items-center gap-3 mb-4 border-b border-white/10 pb-2">
                                <div class="w-8 h-8 rounded-full bg-sky-500/20 flex items-center justify-center text-sky-300 text-xs">01</div>
                                <h3 class="vbs-label uppercase tracking-widest text-sm text-sky-200 font-bold">Guardian Info</h3>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold uppercase tracking-wider text-sky-300/70 block pl-2" for="parent_name">Full Name</label>
                                    <input type="text" id="parent_name" name="Parent Name" required class="w-full ocean-input p-3.5 text-sm">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold uppercase tracking-wider text-sky-300/70 block pl-2" for="parent_phone">Phone Number</label>
                                    <input type="tel" id="parent_phone" name="Parent Phone" required class="w-full ocean-input p-3.5 text-sm">
                                </div>
                                <div class="md:col-span-2 space-y-1">
                                    <label class="text-[10px] font-bold uppercase tracking-wider text-sky-300/70 block pl-2" for="parent_email">Email</label>
                                    <input type="email" id="parent_email" name="_replyto" required class="w-full ocean-input p-3.5 text-sm">
                                </div>
                            </div>
                        </div>

                        <!-- Section 2: Child Configuration Profiles -->
                        <div>
                            <h3 class="vbs-accent-font text-base text-[#356396] mb-3 uppercase tracking-widest border-b-2 border-sky-100/60 pb-1">
                                Child Information
                            </h3>
                            <div class="grid md:grid-cols-3 gap-3">
                                <div class="md:col-span-2">
                                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1" for="child_name">Child's Name (Use Commas to separate; eg. Abigail, Steve, Sarah)</label>
                                    <input type="text" id="child_name" name="Child Name" required class="w-full glass-input p-3 rounded-xl text-sm">
                                </div>
                                <div>
                                    <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-500 mb-1" for="child_age">Use Youngest Age</label>
                                    <input type="number" id="child_age" name="Child Age" min="5" max="12" required class="w-full glass-input p-3 rounded-xl text-sm" placeholder="5-12">
                                </div>
                            </div>
                        </div>

                        <!-- Section 3: Safety Configuration Controls -->
                        <div>
                            <div class="flex items-center gap-3 mb-4 border-b border-white/10 pb-2">
                                <div class="w-8 h-8 rounded-full bg-rose-500/20 flex items-center justify-center text-rose-300 text-xs">03</div>
                                <h3 class="vbs-label uppercase tracking-widest text-sm text-rose-200 font-bold">Emergency Contacts & Info</h3>
                            </div>
                            
                            <div class="space-y-4">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold uppercase tracking-wider text-rose-300/70 block pl-2" for="allergies">Medical Info</label>
                                    <textarea id="allergies" name="Allergies & Medical" rows="2" class="w-full ocean-input p-3.5 text-sm" placeholder="allergies, medical conditions..."></textarea>
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold uppercase tracking-wider text-rose-300/70 block pl-2" for="emergency_contact">Emergency Contact</label>
                                    <input type="text" id="emergency_contact" name="Emergency Contact" required class="w-full ocean-input p-3.5 text-sm" placeholder="Name & Phone">
                                </div>
                            </div>
                        </div>

                        <input type="hidden" name="_subject" value="New Living Water VBS Registration">
                        <input type="text" name="_gotcha" style="display:none">

                        <!-- Core Action Execution Trigger -->
                        <div class="pt-2">
                            <button type="submit" class="w-full block text-center bg-gradient-to-r from-sky-500 to-sky-600 hover:from-sky-600 hover:to-sky-700 text-white font-bold py-4 rounded-2xl shadow-xl transition-all duration-300 vbs-label text-sm uppercase tracking-widest border border-sky-400/40">
                                Submit Form
                            </button>
                        </div>
                    </form>
                </section>

                <!-- Transaction Hub Module Frame (Anchored Bottom Left) -->
                <section class="bg-slate-900/90 border-2 border-sky-400 p-6 rounded-[2.5rem] shadow-[0_0_30px_rgba(56,189,248,0.15)] text-white relative overflow-hidden">
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-white/10 pb-3 mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-sky-400/20 flex items-center justify-center text-sky-400 text-sm">
                                $
                            </div>
                            <div>
                                <h4 class="vbs-label text-sky-400 text-sm uppercase tracking-wider font-extrabold">Required Payment</h4>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wide">$10 Per Child</p>
                            </div>
                        </div>
                        <div class="bg-white/5 px-3 py-1 rounded-xl border border-white/5">
                            <p class="text-[10px] text-slate-300 font-medium uppercase tracking-wide">
                                Placements using Secure Give
                            </p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
                        <div class="md:col-span-2">
                            <div class="bg-emerald-500/10 text-emerald-400 font-extrabold p-3 rounded-xl text-center md:text-left text-[10px] tracking-wider uppercase border border-emerald-500/20">
                                Select "VBS" in the fund dropdown menu
                            </div>
                        </div>
                        <div>
                            <a href="https://app.securegive.com/AFountain/a-fountain-of-life" target="_blank" class="block text-center bg-sky-500 hover:bg-sky-600 text-white font-black py-3 px-4 rounded-2xl shadow-xl transition-all duration-300 vbs-label text-[11px] uppercase tracking-widest border border-sky-400/40">
                                Open Payment Portal
                            </a>
                        </div>
                    </div>
                </section>
            </div>

            <!-- RIGHT PANEL DECK: Banner Media Column (Symmetrical Container) -->
            <section class="lg:col-span-5 flex flex-col h-full">
                <div class="bg-slate-900/40 border border-white/10 p-6 rounded-[2.5rem] backdrop-blur-xl shadow-2xl flex flex-col items-center justify-center flex-grow h-full min-h-[450px]">
                    <div class="w-full h-full bg-slate-950/40 p-4 rounded-[2rem] border border-white/10 shadow-inner flex items-center justify-center overflow-hidden">
                        <img src="temp_images\Announcement_2.png" class="w-full h-full object-contain rounded-2xl mix-blend-lighten" alt="VBS Event Media Sheet">
                    </div>
                </div>
            </section>

        </main>

        <!-- Global Footer Component Anchor -->
        <div id="footer-placeholder" class="w-full mt-auto relative z-30"></div>
    </div>

</body>
</html>

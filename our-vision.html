<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Vision | A Fountain of Life</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    
    <script src="/js/tailwind.js"></script>
    <link href="/css/font-awesome.min.css" rel="stylesheet">
    <link href="/css/css2.css" rel="stylesheet">
    
    <style>
        :root { --primary: #1a1c1e; --accent: #c5a059; }
        body { font-family: 'Montserrat', sans-serif; background-color: white; color: #334155; margin: 0; }
        h1, h2, .serif { font-family: 'Cormorant Garamond', serif; }
        
        .hero-overlay { background: linear-gradient(rgba(26, 28, 30, 0.5), rgba(26, 28, 30, 0.8)); }
        .section-line { width: 60px; height: 2px; background-color: var(--accent); margin: 2rem auto; }
        
        #header-placeholder { position: absolute; top: 0; width: 100%; z-index: 50; }
    </style>

    <script>
        async function loadComponent(id, file) {
            try {
                const element = document.getElementById(id);
                const response = await fetch(file);
                if (response.ok) { element.innerHTML = await response.text(); }
            } catch (error) { console.error(`Error loading ${file}:`, error); }
        }
        window.addEventListener('DOMContentLoaded', () => {
            loadComponent('header-placeholder', './components/header.html');
            loadComponent('footer-placeholder', './components/footer.html');
        });
    </script>
</head>
<body>

    <div id="header-placeholder"></div>

    <section class="relative h-[60vh] flex items-center justify-center bg-[#1a1c1e]">
        <div class="absolute inset-0 hero-overlay"></div>
        <div class="relative text-center px-6">
            <h1 class="text-white text-6xl md:text-8xl mb-4">Our Vision</h1>
            <div class="section-line"></div>
        </div>
    </section>

    <section class="py-24 px-6 max-w-7xl mx-auto">
        <div class="text-center mb-16">
            <p class="text-lg text-slate-500 italic max-w-3xl mx-auto">
                The photos and video below are architectural views and designs of our soon to be built new church!
            </p>
        </div>

        <div class="grid md:grid-cols-2 gap-8 mb-16">
            <div class="shadow-xl">
                <img src="https://afountain.org/wp-content/uploads/2023/09/img-6688_orig-1024x576.jpg" alt="Vision Plan 1" class="w-full h-auto">
            </div>
            <div class="shadow-xl">
                <img src="https://afountain.org/wp-content/uploads/2023/09/img-6689_orig-1024x576.jpg" alt="Vision Plan 2" class="w-full h-auto">
            </div>
        </div>

        <div class="max-w-5xl mx-auto shadow-2xl bg-black aspect-video">
            <iframe class="w-full h-full" 
                    src="https://www.youtube.com/embed/DdxYsJDFsNA" 
                    title="NEW CHURCH BUILDING" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>
    </section>

    <section class="py-20 bg-[#FFFFFF] text-center px-6">
        <a href="https://app.securegive.com/AFountain/a-fountain-of-life" 
            target="_blank" 
            rel="noopener noreferrer"
            class="inline-block px-12 py-5 bg-[#c5a059] text-white uppercase text-xs font-bold tracking-[0.4em] transition-all duration-300 hover:brightness-90 shadow-md hover:shadow-lg">
                Support The Vision
        </a>
    </section>

    <div id="footer-placeholder"></div>

</body>

<script>
    async function loadComponent(id, file) {
        try {
            const element = document.getElementById(id);
            const response = await fetch(file);
            if (response.ok) {
                const html = await response.text();
                element.innerHTML = html;

                // THIS IS THE MISSING PIECE:
                // Manually find and execute scripts within the loaded component
                const scripts = element.querySelectorAll("script");
                scripts.forEach(oldScript => {
                    const newScript = document.createElement("script");
                    if (oldScript.src) {
                        newScript.src = oldScript.src;
                    } else {
                        newScript.text = oldScript.text;
                    }
                    document.head.appendChild(newScript).parentNode.removeChild(newScript);
                });
            }
        } catch (error) { 
            console.error(`Error loading ${file}:`, error); 
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        loadComponent('header-placeholder', './components/header.html');
        loadComponent('footer-placeholder', './components/footer.html');
    });
</script>

</html>
